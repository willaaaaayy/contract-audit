services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: contract-audit-postgres
    environment:
      POSTGRES_DB: contract_audit
      POSTGRES_USER: contract_audit
      POSTGRES_PASSWORD: contract_audit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract_audit -d contract_audit"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: contract-audit-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # консоль
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: contract-audit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Локальный inference для профиля `local` (self-hosted, без облачных ключей).
  # GPU необязателен — на CPU работает, но медленнее; для маломощного VDS возьмите
  # модели полегче (см. ollama-init и README).
  ollama:
    image: ollama/ollama:latest
    container_name: contract-audit-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Раскомментируйте для GPU-ускорения (нужен nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Одноразовый сервис: дожидается Ollama и тянет нужные модели, затем завершается.
  # Чат-модель и эмбеддер переопределяются переменными OLLAMA_CHAT_MODEL / OLLAMA_EMBED_MODEL.
  # Для слабого VDS: OLLAMA_CHAT_MODEL=qwen2.5:3b-instruct
  ollama-init:
    image: ollama/ollama:latest
    container_name: contract-audit-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:7b-instruct}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Тяну эмбеддер $$OLLAMA_EMBED_MODEL …" && ollama pull "$$OLLAMA_EMBED_MODEL" &&
        echo "Тяну чат-модель $$OLLAMA_CHAT_MODEL …" && ollama pull "$$OLLAMA_CHAT_MODEL" &&
        echo "Модели готовы."
    restart: "no"

volumes:
  pgdata:
  miniodata:
  ollamadata:
