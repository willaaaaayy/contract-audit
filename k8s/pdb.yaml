# PodDisruptionBudget: при добровольных нарушениях (drain узла, обновление кластера)
# всегда остаётся хотя бы одна живая реплика (replicas: 2, HPA min 2 — см. hpa.yaml).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: contract-audit
  labels:
    app: contract-audit
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: contract-audit
