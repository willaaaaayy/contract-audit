apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: contract-audit
  labels:
    app: contract-audit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: contract-audit
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # не дёргаем реплики вниз слишком быстро
