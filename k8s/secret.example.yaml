# ШАБЛОН. Не коммитьте реальные значения — создавайте через `kubectl create secret`
# или внешний секрет-менеджер (External Secrets / Vault). stringData для читаемости.
apiVersion: v1
kind: Secret
metadata:
  name: contract-audit-secrets
  labels:
    app: contract-audit
type: Opaque
stringData:
  DB_URL: "jdbc:postgresql://postgres:5432/contract_audit"
  DB_USER: "contract_audit"
  DB_PASSWORD: "CHANGE_ME"
  OPENAI_API_KEY: "sk-CHANGE_ME"
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
---
# Ключи подписи JWT (PEM). Монтируются как файлы в /etc/jwt.
apiVersion: v1
kind: Secret
metadata:
  name: contract-audit-jwt
  labels:
    app: contract-audit
type: Opaque
stringData:
  private.pem: |
    -----BEGIN PRIVATE KEY-----
    CHANGE_ME
    -----END PRIVATE KEY-----
  public.pem: |
    -----BEGIN PUBLIC KEY-----
    CHANGE_ME
    -----END PUBLIC KEY-----
