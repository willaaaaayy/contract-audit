# Требует Prometheus Operator (CRD ServiceMonitor). Заставляет Prometheus собирать метрики
# приложения с /actuator/prometheus.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: contract-audit
  labels:
    app: contract-audit
    release: kube-prometheus-stack   # под label-селектор вашего Prometheus
spec:
  selector:
    matchLabels:
      app: contract-audit
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
