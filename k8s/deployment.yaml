apiVersion: apps/v1
kind: Deployment
metadata:
  name: contract-audit
  labels:
    app: contract-audit
spec:
  replicas: 2                      # >1 — поэтому rate-limit на Redis (общий лимит)
  selector:
    matchLabels:
      app: contract-audit
  template:
    metadata:
      labels:
        app: contract-audit
    spec:
      # Токен Kubernetes API не нужен — выделенный SA с отключённым automount (serviceaccount.yaml).
      serviceAccountName: contract-audit
      # Pod-level: контейнер не от root, стандартный seccomp-профиль RuntimeDefault.
      # UID/GID 1000 совпадают с USER 1000:1000 из Dockerfile (ubuntu в noble-базе).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: contract-audit
          # CI публикует образ в GHCR по SHA коммита (см. .github/workflows/ci.yml);
          # для прод-деплоя зафиксируйте конкретный тег вместо latest.
          image: ghcr.io/willaaaaayy/contract-audit:latest
          # Container-level: минимум привилегий. readOnlyRootFilesystem требует writable /tmp
          # (multipart-загрузка, временные файлы PDFBox/Tesseract) — монтируем emptyDir ниже.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ "ALL" ]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: contract-audit-config
            - secretRef:
                name: contract-audit-secrets
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/jwt
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "1536Mi"
          # Spring Boot health groups: liveness/readiness (management.endpoint.health.probes.enabled)
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            failureThreshold: 30
            periodSeconds: 5            # до 150с на старт (Flyway, прогрев)
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: jwt-keys
          secret:
            secretName: contract-audit-jwt
        - name: tmp
          emptyDir: {}
