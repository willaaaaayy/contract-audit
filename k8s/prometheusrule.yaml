# Алерты на метрики приложения. Требует Prometheus Operator (CRD PrometheusRule).
# Имена метрик — из Micrometer/Spring Boot (точки → подчёркивания, у счётчиков суффикс _total).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: contract-audit
  labels:
    app: contract-audit
    release: kube-prometheus-stack
spec:
  groups:
    - name: contract-audit.availability
      rules:
        - alert: ContractAuditDown
          expr: up{job="contract-audit"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Инстансы contract-audit недоступны"
            description: "Цель {{ $labels.instance }} не отвечает на scrape более 2 минут."

    - name: contract-audit.pipeline
      rules:
        # Доля FAILED-обработок документов > 20% за 10 минут.
        - alert: HighDocumentProcessingFailureRate
          expr: |
            sum(rate(contract_audit_documents_processed_total{status="failed"}[10m]))
              /
            clamp_min(sum(rate(contract_audit_documents_processed_total[10m])), 0.001)
              > 0.2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Высокая доля ошибок обработки документов"
            description: "Более 20% документов уходят в FAILED за последние 10 минут."

    - name: contract-audit.http
      rules:
        # Всплеск 429 — возможна brute-force атака или слишком жёсткий лимит.
        - alert: AuthRateLimitSpike
          expr: sum(rate(http_server_requests_seconds_count{status="429"}[5m])) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Много ответов 429 на auth-эндпоинтах"
            description: "Частота 429 > 1/сек 5 минут — проверьте источник трафика."

        # p95 латентности HTTP > 2с.
        - alert: HighRequestLatencyP95
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Высокая p95-латентность HTTP"
            description: "p95 времени ответа > 2с последние 10 минут."

        # Доля 5xx > 5%.
        - alert: HighServerErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
              /
            clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001)
              > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Высокая доля 5xx"
            description: "Более 5% запросов завершаются ошибкой сервера."

    - name: contract-audit.jvm
      rules:
        - alert: HighJvmHeapUsage
          expr: |
            sum by (instance) (jvm_memory_used_bytes{area="heap"})
              /
            sum by (instance) (jvm_memory_max_bytes{area="heap"})
              > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "JVM heap > 90%"
            description: "Инстанс {{ $labels.instance }} близок к пределу heap — риск OOM/долгих GC."
