
<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contract Audit — AI-аудит B2B-договоров</title>
  <meta name="description" content="Загрузите PDF-договор — ИИ извлечёт текст, найдёт риски, сверит с политиками и даст семантический поиск.">
  <style>
    :root {
      --bg: #0a0e1a; --bg-soft: #0f1525; --surface: #141b2e; --surface-2: #1b2438;
      --border: #25304a; --border-soft: #1d2740;
      --txt: #eef2fb; --txt-muted: #93a0bd; --txt-faint: #5e6b87;
      --accent: #6366f1; --accent-2: #22d3ee; --accent-soft: rgba(99,102,241,.14); --accent-ring: rgba(99,102,241,.4);
      --success: #34d399; --warn: #fbbf24; --orange: #fb923c; --danger: #f87171;
      --grad: linear-gradient(120deg, #6366f1 0%, #22d3ee 100%);
      --shadow: 0 18px 50px -20px rgba(0,0,0,.7);
      --radius: 18px;
    }
    [data-theme="light"] {
      --bg: #f6f8fc; --bg-soft: #eef2f9; --surface: #ffffff; --surface-2: #f3f6fc;
      --border: #e2e8f4; --border-soft: #eaeff8;
      --txt: #0f172a; --txt-muted: #5a6783; --txt-faint: #93a0bd;
      --accent-soft: rgba(99,102,241,.09); --shadow: 0 18px 50px -24px rgba(31,45,80,.28);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--txt); line-height: 1.55; -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(620px circle at 12% -8%, rgba(99,102,241,.20), transparent 60%),
                  radial-gradient(560px circle at 92% 4%, rgba(34,211,238,.14), transparent 55%);
    }
    [data-theme="light"] body::before { opacity: .7; }
    .shell { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 0 22px; }
    a { color: inherit; }

    /* header */
    header { position: sticky; top: 0; z-index: 20; backdrop-filter: saturate(150%) blur(12px);
      background: color-mix(in srgb, var(--bg) 78%, transparent); border-bottom: 1px solid var(--border-soft); }
    .nav { display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .brand { display: flex; align-items: center; gap: 11px; font-weight: 650; letter-spacing: -.01em; cursor: pointer; }
    .logo { width: 34px; height: 34px; border-radius: 10px; background: var(--grad); display: grid; place-items: center; box-shadow: 0 6px 18px -6px var(--accent-ring); }
    .logo svg { width: 19px; height: 19px; }
    .brand small { display: block; color: var(--txt-faint); font-size: 11px; font-weight: 500; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .who { color: var(--txt-muted); font-size: 13px; display: flex; align-items: center; gap: 7px; }
    .who b { color: var(--txt); font-weight: 600; }

    /* buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; height: 40px; padding: 0 17px;
      border-radius: 11px; font: inherit; font-size: 14px; font-weight: 550; cursor: pointer; border: 1px solid transparent; transition: .16s; white-space: nowrap; }
    .btn svg { width: 16px; height: 16px; }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 8px 22px -10px var(--accent-ring); }
    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; filter: none; }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--txt-muted); }
    .btn-ghost:hover { color: var(--txt); border-color: var(--accent); background: var(--accent-soft); }
    .btn-sm { height: 34px; padding: 0 13px; font-size: 13px; border-radius: 9px; }
    .icon-btn { width: 38px; height: 38px; display: grid; place-items: center; cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--txt-muted); border-radius: 10px; transition: .16s; }
    .icon-btn:hover { color: var(--txt); border-color: var(--accent); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* generic */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; }
    .card h2 { font-size: 12px; margin: 0 0 14px; text-transform: uppercase; letter-spacing: .07em; color: var(--txt-faint);
      font-weight: 650; display: flex; align-items: center; gap: 8px; }
    .card h2 svg { width: 15px; height: 15px; }
    .card h2 .count { margin-left: auto; color: var(--txt-muted); background: var(--surface-2); border: 1px solid var(--border);
      padding: 1px 9px; border-radius: 999px; font-size: 11px; letter-spacing: 0; }
    .empty { color: var(--txt-faint); font-size: 13.5px; padding: 4px 0; }
    .muted { color: var(--txt-muted); }
    .spinner { width: 18px; height: 18px; flex: none; border-radius: 50%; border: 2.4px solid var(--border); border-top-color: var(--accent); animation: spin .7s linear infinite; }
    .spinner.lg { width: 26px; height: 26px; border-width: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp .45s cubic-bezier(.2,.7,.3,1) both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .row { display: flex; gap: 12px; align-items: center; }
    .grow { flex: 1; }

    /* forms */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--txt-muted); margin-bottom: 6px; font-weight: 500; }
    .input, textarea.input {
      width: 100%; height: 44px; padding: 0 14px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 11px; color: var(--txt); font: inherit; font-size: 14.5px; transition: .15s; outline: none;
    }
    textarea.input { height: auto; padding: 12px 14px; resize: vertical; min-height: 92px; line-height: 1.5; }
    .input:focus, textarea.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .input::placeholder { color: var(--txt-faint); }
    .check { display: flex; align-items: center; gap: 9px; font-size: 14px; color: var(--txt-muted); cursor: pointer; }
    .check input { width: 17px; height: 17px; accent-color: var(--accent); }
    .form-err { color: var(--danger); font-size: 13.5px; margin-top: 4px; min-height: 18px; }

    /* badges */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 7px; font-size: 11.5px; font-weight: 600; letter-spacing: .02em; border: 1px solid transparent; }
    .b-low { color: var(--success); background: rgba(52,211,153,.13); border-color: rgba(52,211,153,.35); }
    .b-medium { color: var(--warn); background: rgba(251,191,36,.13); border-color: rgba(251,191,36,.35); }
    .b-high { color: var(--orange); background: rgba(251,146,60,.13); border-color: rgba(251,146,60,.35); }
    .b-critical { color: var(--danger); background: rgba(248,113,113,.14); border-color: rgba(248,113,113,.4); }
    .b-pending, .b-processing { color: var(--accent-2); background: rgba(34,211,238,.12); border-color: rgba(34,211,238,.32); }
    .b-done { color: var(--success); background: rgba(52,211,153,.13); border-color: rgba(52,211,153,.35); }
    .b-failed { color: var(--danger); background: rgba(248,113,113,.14); border-color: rgba(248,113,113,.4); }
    .b-contradiction { color: var(--danger); background: rgba(248,113,113,.14); border-color: rgba(248,113,113,.4); }
    .b-missing_required { color: var(--warn); background: rgba(251,191,36,.13); border-color: rgba(251,191,36,.35); }

    /* dropzone */
    .drop { position: relative; display: block; cursor: pointer; border: 1.5px dashed var(--border); border-radius: var(--radius);
      background: var(--surface); padding: 40px 24px; text-align: center; transition: .18s; }
    .drop:hover { border-color: var(--accent); background: color-mix(in srgb, var(--surface) 84%, var(--accent) 16%); }
    .drop.over { border-color: var(--accent); background: var(--accent-soft); transform: scale(1.012); box-shadow: var(--shadow); }
    .drop input { display: none; }
    .drop-ico { width: 54px; height: 54px; margin: 0 auto 14px; border-radius: 16px; background: var(--accent-soft); display: grid; place-items: center; color: var(--accent); transition: transform .25s; }
    .drop:hover .drop-ico { transform: translateY(-3px); }
    .drop-ico svg { width: 27px; height: 27px; }
    .drop-title { font-size: 16px; font-weight: 600; } .drop-title b { color: var(--accent); }
    .drop-hint { color: var(--txt-faint); font-size: 13px; margin-top: 6px; }

    /* finding/risk items */
    .item { padding: 15px 17px; border-radius: 13px; background: var(--surface-2); border: 1px solid var(--border-soft); margin-bottom: 11px; transition: border-color .16s; }
    .item:last-child { margin-bottom: 0; }
    .item:hover { border-color: var(--accent); }
    .item-top { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; flex-wrap: wrap; }
    .item-type { font-weight: 600; font-size: 14.5px; }
    .ref-badge { font-size: 12px; font-weight: 650; color: var(--accent); background: var(--accent-soft); border: 1px solid var(--accent-ring); padding: 2px 9px; border-radius: 7px; }
    .quote { border-left: 3px solid var(--border); padding: 4px 0 4px 13px; margin: 8px 0; color: var(--txt-muted); font-style: italic; font-size: 14px; white-space: pre-wrap; }
    .explain { font-size: 14px; color: var(--txt); }

    /* doc list */
    .doc { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border-soft);
      background: var(--surface-2); margin-bottom: 9px; cursor: pointer; transition: .15s; }
    .doc:last-child { margin-bottom: 0; }
    .doc:hover { border-color: var(--accent); }
    .doc.active { border-color: var(--accent); background: var(--accent-soft); }
    .doc .fi { width: 34px; height: 34px; flex: none; border-radius: 9px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; }
    .doc .fi svg { width: 17px; height: 17px; }
    .doc .meta { min-width: 0; flex: 1; }
    .doc .name { font-size: 14px; font-weight: 550; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc .sub { font-size: 12px; color: var(--txt-faint); }

    /* tabs */
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; border-bottom: 1px solid var(--border-soft); }
    .tab { padding: 9px 14px; font-size: 14px; color: var(--txt-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: .15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
    .tab:hover { color: var(--txt); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 550; }

    /* search result */
    .hit { padding: 13px 15px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--border-soft); margin-bottom: 10px; }
    .hit-top { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
    .dist { margin-left: auto; font-size: 12px; color: var(--txt-faint); font-variant-numeric: tabular-nums; }
    .sim-bar { height: 5px; border-radius: 3px; background: var(--border); overflow: hidden; margin-top: 9px; }
    .sim-bar i { display: block; height: 100%; background: var(--grad); }

    /* adaptive audit */
    .seg.role { margin-bottom: 0; width: auto; }
    .seg.role button { padding: 0 13px; height: 32px; font-size: 13px; flex: none; }
    .gauge-card { display: flex; align-items: center; gap: 20px; }
    .gauge { position: relative; width: 108px; height: 108px; flex: none; }
    .gauge svg { transform: rotate(-90deg); display: block; }
    .gauge .gv { position: absolute; inset: 0; display: grid; place-items: center; font-size: 28px; font-weight: 750; letter-spacing: -.02em; }
    .gauge-meta .band { font-size: 17px; font-weight: 660; letter-spacing: -.01em; }
    .gauge-meta .gsub { color: var(--txt-muted); font-size: 13px; margin-top: 2px; }
    .sevbar { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .rail-toggle { display: flex; align-items: center; gap: 8px; width: 100%; background: none; border: none; color: var(--txt-faint);
      font: inherit; font-size: 12px; text-transform: uppercase; letter-spacing: .07em; font-weight: 650; cursor: pointer; padding: 2px 0; }
    .rail-toggle svg { width: 14px; height: 14px; transition: transform .2s; }
    .rail-toggle.open svg { transform: rotate(90deg); }
    .gen-tag { font-size: 10px; font-weight: 700; letter-spacing: .04em; color: var(--accent-2);
      border: 1px solid rgba(34,211,238,.35); background: rgba(34,211,238,.1); padding: 1px 6px; border-radius: 6px; text-transform: uppercase; }
    .prof-item { display: flex; gap: 10px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border-soft); }
    .prof-item:last-child { border-bottom: none; }
    .prof-item .pdot { width: 9px; height: 9px; border-radius: 50%; margin-top: 6px; flex: none; }
    .prof-item .pl { font-size: 14px; font-weight: 550; }
    .prof-item .pn { font-size: 13px; color: var(--txt-muted); }
    .sugg { border: 1px solid var(--border-soft); border-radius: 12px; padding: 13px 15px; margin-bottom: 11px; background: var(--surface-2); transition: .15s; }
    .sugg.acc { border-color: var(--success); background: color-mix(in srgb, var(--success) 9%, var(--surface-2)); }
    .sugg.rej { opacity: .45; }
    .sugg-top { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; flex-wrap: wrap; }
    .sugg-was { font-size: 13.5px; color: var(--txt-muted); text-decoration: line-through; text-decoration-color: var(--orange); margin-bottom: 8px; white-space: pre-wrap; }
    .sugg-now { font-size: 14.5px; color: var(--txt); background: rgba(52,211,153,.1); border-left: 3px solid var(--success); padding: 7px 12px; border-radius: 0 8px 8px 0; white-space: pre-wrap; }
    .sugg-why { font-size: 13px; color: var(--txt-muted); margin-top: 8px; }
    .sugg-actions { display: flex; gap: 8px; margin-top: 11px; }
    .viewer { font: 13.5px/1.7 ui-monospace, Menlo, monospace; white-space: pre-wrap; word-break: break-word; max-height: 460px; overflow: auto;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; color: var(--txt-muted); }
    .viewer mark { background: rgba(251,191,36,.28); color: var(--txt); border-radius: 3px; padding: 0 2px; animation: flash 1.2s ease; }
    @keyframes flash { 0% { background: rgba(251,191,36,.7); } 100% { background: rgba(251,191,36,.28); } }
    .actionbar { position: sticky; bottom: 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      background: color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter: blur(8px); border-top: 1px solid var(--border-soft);
      padding: 12px 0 4px; margin-top: 6px; }
    .stamp { font-size: 12px; font-weight: 650; padding: 4px 11px; border-radius: 8px; }
    .stamp.ok { color: var(--success); background: rgba(52,211,153,.13); border: 1px solid rgba(52,211,153,.35); }
    .stamp.rework { color: var(--orange); background: rgba(251,146,60,.13); border: 1px solid rgba(251,146,60,.35); }

    /* landing bits (preview) */
    .hero { padding: 56px 0 14px; text-align: center; }
    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 13px; margin-bottom: 22px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); font-size: 12.5px; color: var(--txt-muted); }
    .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 4px rgba(52,211,153,.16); }
    h1 { font-size: clamp(30px, 5vw, 50px); line-height: 1.06; letter-spacing: -.03em; margin: 0 0 16px; font-weight: 720; }
    h1 .grad { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .lede { max-width: 600px; margin: 0 auto; color: var(--txt-muted); font-size: 17px; }
    .cta-row { display: flex; gap: 12px; justify-content: center; margin-top: 26px; flex-wrap: wrap; }
    .upload { margin: 34px auto 0; max-width: 680px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 14px 0; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; transition: .16s; }
    .stat:hover { transform: translateY(-2px); border-color: var(--accent); }
    .stat .ico { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; margin-bottom: 11px; }
    .stat .ico svg { width: 16px; height: 16px; }
    .stat b { font-size: 25px; font-weight: 700; letter-spacing: -.02em; display: block; line-height: 1.1; }
    .stat span { color: var(--txt-muted); font-size: 13px; }
    .i-blue { background: rgba(99,102,241,.15); color: #818cf8; } .i-cyan { background: rgba(34,211,238,.15); color: var(--accent-2); }
    .i-amber { background: rgba(251,191,36,.15); color: var(--warn); } .i-green { background: rgba(52,211,153,.15); color: var(--success); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .chips { display: flex; gap: 9px; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 10px; font-size: 13.5px; font-variant-numeric: tabular-nums; border: 1px solid var(--border); background: var(--surface-2); }
    .chip svg { width: 14px; height: 14px; opacity: .85; }
    .chip.date { color: #a5b4fc; } .chip.amount { color: #67e8f9; }
    .clause { position: relative; padding: 13px 15px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--border-soft); margin-bottom: 10px; }
    .clause:last-child { margin-bottom: 0; }
    .clause .body { white-space: pre-wrap; font-size: 14.5px; }
    details.full > summary { list-style: none; cursor: pointer; display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 15px 20px; font-size: 13.5px; color: var(--txt-muted); transition: .16s; user-select: none; }
    details.full > summary::-webkit-details-marker { display: none; }
    details.full > summary:hover { color: var(--txt); border-color: var(--accent); }
    details.full > summary .chev { transition: transform .2s; width: 16px; height: 16px; }
    details.full[open] > summary { border-radius: 16px 16px 0 0; border-bottom: none; }
    details.full[open] > summary .chev { transform: rotate(90deg); }
    pre.full-text { white-space: pre-wrap; word-break: break-word; font: 13px/1.65 ui-monospace, Menlo, monospace; color: var(--txt-muted);
      max-height: 420px; overflow: auto; margin: 0; background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 16px 16px; padding: 18px 20px; }

    /* auth view */
    .auth-wrap { max-width: 420px; margin: 56px auto 0; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px 26px 24px; box-shadow: var(--shadow); }
    .auth-head { text-align: center; margin-bottom: 22px; }
    .auth-head h2 { font-size: 22px; margin: 0 0 6px; letter-spacing: -.02em; }
    .auth-head p { margin: 0; color: var(--txt-muted); font-size: 14px; }
    .seg { display: flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 22px; }
    .seg button { flex: 1; height: 36px; border: none; background: none; color: var(--txt-muted); font: inherit; font-size: 14px; border-radius: 9px; cursor: pointer; transition: .15s; }
    .seg button.active { background: var(--accent); color: #fff; font-weight: 550; }
    .auth-foot { text-align: center; margin-top: 16px; color: var(--txt-faint); font-size: 12.5px; }

    /* features */
    .features { padding: 56px 0 26px; }
    .features h3 { text-align: center; font-size: 13px; text-transform: uppercase; letter-spacing: .1em; color: var(--txt-faint); margin: 0 0 6px; }
    .features .ft-sub { text-align: center; color: var(--txt-muted); font-size: 18px; margin: 0 0 30px; }
    .feat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .feat { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px 20px; transition: .18s; }
    .feat:hover { transform: translateY(-3px); border-color: var(--accent); }
    .feat .fic { width: 42px; height: 42px; border-radius: 12px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; margin-bottom: 14px; }
    .feat .fic svg { width: 21px; height: 21px; }
    .feat h4 { margin: 0 0 6px; font-size: 15.5px; } .feat p { margin: 0; color: var(--txt-muted); font-size: 13.5px; }

    footer { border-top: 1px solid var(--border-soft); padding: 26px 0 40px; margin-top: 40px; }
    .foot { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; color: var(--txt-faint); font-size: 13px; }
    .foot .stack { display: flex; gap: 8px; flex-wrap: wrap; }
    .foot .stack code { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 2px 8px; font-size: 11.5px; color: var(--txt-muted); }

    .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--accent);
      color: var(--txt); padding: 11px 16px; border-radius: 11px; font-size: 13.5px; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: .25s; z-index: 50; display: flex; align-items: center; gap: 9px; max-width: 90vw; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast svg { width: 16px; height: 16px; flex: none; }
    .toast.ok { border-color: var(--success); } .toast.ok svg { color: var(--success); }

/* ============================ helpers ============================ */
const $ = s => document.querySelector(s);
const el = id => document.getElementById(id);
function esc(s){ return (s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const fmt = n => (n ?? 0).toLocaleString('ru-RU');

/* auth/session state */
const AUTH = {
  get token(){ try { return localStorage.getItem('ca-token'); } catch(e){ return null; } },
  get slug(){ try { return localStorage.getItem('ca-slug') || ''; } catch(e){ return ''; } },
  get email(){ try { return localStorage.getItem('ca-email') || ''; } catch(e){ return ''; } },
  set(token, slug, email){ try { localStorage.setItem('ca-token', token); localStorage.setItem('ca-slug', slug); localStorage.setItem('ca-email', email); } catch(e){} },
  clear(){ try { localStorage.removeItem('ca-token'); } catch(e){} },
  get authed(){ return !!this.token; }
};

/* fetch wrapper with bearer + 401 handling */
async function api(path, { method='GET', body, form, auth=true } = {}) {
  const headers = {};
  const opts = { method, headers };
  if (form) { opts.body = form; }
  else if (body !== undefined) { headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  if (auth && AUTH.token) headers['Authorization'] = 'Bearer ' + AUTH.token;
  const res = await fetch(path, opts);
  if (res.status === 401 && auth) { AUTH.clear(); go('/login'); throw new ApiError('Сессия истекла, войдите снова', 401); }
  if (!res.ok) {
    let msg = 'Ошибка ' + res.status;
    try { const j = await res.json(); msg = j.message || j.error || msg; } catch(e){}
    throw new ApiError(msg, res.status);
  }
  if (res.status === 204) return null;
  const ct = res.headers.get('content-type') || '';
  return ct.includes('application/json') ? res.json() : res.text();
}
class ApiError extends Error { constructor(m, s){ super(m); this.status = s; } }

/* toast */
let toastT;
function toast(msg, kind='ok') {
  const t = el('toast');
  t.className = 'toast ' + kind;
  el('toastMsg').textContent = msg;
  el('toastIco').innerHTML = kind === 'bad'
    ? '<circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>'
    : '<path d="M20 6 9 17l-5-5"/>';
  t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2200);
}
function copy(text){ navigator.clipboard?.writeText(text).then(() => toast('Скопировано')).catch(()=>{}); }

/* theme */
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem('ca-theme', t); } catch(e){} renderNav(); }
function toggleTheme(){ applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
(function(){ let s; try { s = localStorage.getItem('ca-theme'); } catch(e){}
  const light = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  document.documentElement.setAttribute('data-theme', s || (light ? 'light' : 'dark')); })();

/* badges */
function severityBadge(sev){ const s = (sev||'MEDIUM').toLowerCase(); return `<span class="badge b-${s}">${esc(sev||'—')}</span>`; }
function statusBadge(st){ const s = (st||'PENDING').toLowerCase(); const label = {PENDING:'В очереди',PROCESSING:'Обработка',DONE:'Готов',FAILED:'Ошибка'}[st]||st;
  const sp = (st==='PENDING'||st==='PROCESSING') ? '<span class="spinner" style="width:11px;height:11px;border-width:2px"></span>' : '';
  return `<span class="badge b-${s}">${sp}${esc(label)}</span>`; }
function findingBadge(type){ const s=(type||'').toLowerCase(); const label={CONTRADICTION:'Противоречие',MISSING_REQUIRED:'Нет пункта'}[type]||type; return `<span class="badge b-${s}">${esc(label)}</span>`; }

/* ============================ router ============================ */
function go(path){ if (location.hash !== '#'+path) location.hash = path; else route(); }
window.addEventListener('hashchange', route);

function route(){
  const path = (location.hash || '#/').slice(1);
  renderNav();
  renderRoute(path);
  const view = el('view');
  if (view) view.focus({ preventScroll: false });   // фокус на новый экран (доступность)
}
function renderRoute(path){
  if (path === '/login') return renderAuth();
  if (path.startsWith('/app/doc/')) { if (!AUTH.authed) return go('/login'); return renderDocPage(decodeURIComponent(path.slice('/app/doc/'.length))); }
  if (path.startsWith('/app')) { if (!AUTH.authed) return go('/login'); return renderApp(); }
  if (path === '/' || path === '') return renderLanding();
  return renderNotFound();   // неизвестный маршрут — явный 404, а не тихий откат на лендинг
}

async function runPreview(file){
  const st = el('pvStatus'), out = el('pvResult');

  const form = new FormData(); form.append('file', file);
  try {
    const d = await api('/api/preview', { method:'POST', form, auth:false });
    st.innerHTML = '';
    renderPreview(out, d);
  } catch(e){
    st.innerHTML = `<div class="banner err">${I.alert}<span>${esc(e.message)}. Возможно, это не PDF или скан без распознаваемого текста.</span></div>`;
  }
}

async function loadDocs(toastIt){

    // keep polling if any in-flight

    if (pending) schedulePoll(); else stopPoll();
  } catch(e){ if (el('docList')) el('docList').innerHTML = `<div class="banner err">${I.alert}<span>${esc(e.message)}</span></div>`; }

function renderDocList(){

// Анализ ИИ (риски/комплаенс/профиль/предложения) — по кнопке, см. runFullAnalysis.
async function loadAudit(id, force){
  const box = el('detail'); if (!box) return;
  const doc = APP.docs.find(d => d.id===id);
  if (!doc){ renderDetailEmpty(); return; }
  if (doc.status !== 'DONE'){

  box.innerHTML = detailHead(doc) + `<div class="card"><div class="row muted" style="font-size:13.5px"><span class="spinner"></span> Собираю экран аудита…</div></div>`;

    const [risks, findings, textRes] = await Promise.all([
      api(`/api/documents/${id}/risks`).catch(()=>[]),
      api(`/api/documents/${id}/compliance`).catch(()=>[]),
      api(`/api/documents/${id}/text`).catch(()=>({text:''}))
    ]);
    const prev = APP.audit[id] || {};
    APP.audit[id] = { risks: risks||[], findings: findings||[], text: (textRes&&textRes.text)||'',
      profile: prev.profile||null, suggestions: prev.suggestions||null,
      analyzed: !!(risks&&risks.length), decision: loadDecision(id), highlight: null };
    renderAudit(id);
  } catch(e){
    box.innerHTML = detailHead(doc) + `<div class="card"><div class="banner err">${I.alert}<span>${esc(e.message)}</span></div></div>`;
  }
}

/* ---- контекст: скоринг, тип, ключевые данные ---- */
const SEV_PENALTY = { CRITICAL:35, HIGH:18, MEDIUM:8, LOW:3 };
function computeScore(risks){ let s=100; (risks||[]).forEach(r=> s -= (SEV_PENALTY[r.severity]||8)); return Math.max(0, Math.min(100, Math.round(s))); }
function scoreBand(score){
  if (score>=80) return { color:'var(--success)', label:'Можно подписывать', sub:'Существенных рисков не видно' };
  if (score>=60) return { color:'var(--warn)', label:'С осторожностью', sub:'Есть замечания к проработке' };
  if (score>=40) return { color:'var(--orange)', label:'Серьёзные правки', sub:'Нужны изменения до подписания' };
  return { color:'var(--danger)', label:'Эскалировать', sub:'Критические условия' };
}
function sevCounts(risks){ const c={CRITICAL:0,HIGH:0,MEDIUM:0,LOW:0}; (risks||[]).forEach(r=> c[r.severity]=(c[r.severity]||0)+1); return c; }
const DATE_RE = /\b(\d{1,2}[.\/]\d{1,2}[.\/]\d{2,4}|\d{4}-\d{2}-\d{2})\b/g;
const AMOUNT_RE = /(\d[\d\s.,]*\d|\d)\s?(руб|₽|RUB|USD|\$|EUR|€|тыс\.?|млн\.?)/gi;
function keyDataJS(text){
  const dates = [...new Set((text.match(DATE_RE)||[]))].slice(0,12);
  const amounts = [...new Set((text.match(AMOUNT_RE)||[]).map(s=>s.trim()))].slice(0,12);
  return { dates, amounts };
}
function detectType(a){
  if (a.profile && a.profile.contractType) return a.profile.contractType;
  const t = (a.text||'').toLowerCase();
  if (/конфиденциальн|неразглаш|nda|non-disclosure/.test(t)) return 'NDA';
  if (/\bsla\b|уровень обслуживания|доступность|uptime/.test(t)) return 'SLA';
  if (/поставк|товар|отгрузк|supply/.test(t)) return 'поставка';
  if (/аренд|наймодател|lease|\brent\b/.test(t)) return 'аренда';
  if (/оказани[ея] услуг|исполнитель|услуг/.test(t)) return 'услуги';
  return '—';
}

/* ---- layout engine: вес блоков = роль × тип × профиль риска × состояние ---- */
let QUOTES = [];
function composeBlocks(a){
  const c = sevCounts(a.risks);
  const missingReq = (a.findings||[]).filter(f=>f.type==='MISSING_REQUIRED').length;
  const kd = keyDataJS(a.text||'');
  const base = {
    lawyer:   { risks:1.0, compliance:0.8, suggestions:1.0, keydata:0.5, profile:0.7 },
    buyer:    { risks:0.7, compliance:0.7, suggestions:0.6, keydata:1.0, profile:0.8 },
    approver: { risks:0.8, compliance:0.9, suggestions:0.4, keydata:0.6, profile:0.6 },
    reader:   { risks:0.7, compliance:0.7, suggestions:0.4, keydata:0.7, profile:0.7 }
  }[APP.role];
  const hasHigh = c.CRITICAL + c.HIGH > 0;
  const blocks = [];
  blocks.push({ key:'risks', w: base.risks*(1 + c.CRITICAL*0.8 + c.HIGH*0.4), html: risksBlock(a) });
  blocks.push({ key:'compliance', w: base.compliance*(1 + missingReq*0.8), html: complianceBlock(a) });
  if (a.suggestions || hasHigh) blocks.push({ key:'suggestions', w: base.suggestions*(hasHigh?1.6:0.7), html: suggestionsBlock(a) });
  blocks.push({ key:'keydata', w: base.keydata*(kd.dates.length?1.3:1), html: keydataBlock(a, kd) });
  // генеративные блоки профиля — динамический инвентарь под конкретный договор
  (a.profile && a.profile.blocks || []).forEach((pb,i) => {
    const items = pb.items||[];
    const miss = items.filter(it=>(it.status||'').toUpperCase()==='MISSING').length;
    const att = items.filter(it=>(it.status||'').toUpperCase()==='ATTENTION').length;
    blocks.push({ key:'profile-'+i, w: base.profile*(1 + miss*0.6 + att*0.3), html: profileBlock(pb) });
  });
  blocks.sort((x,y)=> y.w - x.w);
  const ws = blocks.map(b=>b.w).slice().sort((x,y)=>x-y);
  const median = ws.length ? ws[Math.floor(ws.length/2)] : 0;
  blocks.forEach((b,i)=> b.expanded = b.w>=median || i<2);   // выше медианы — в основную колонку
  return blocks;
}

function renderAudit(id){
  const box = el('detail'); if (!box) return;
  const a = APP.audit[id], doc = APP.docs.find(d=>d.id===id);
  if (!a || !doc){ renderDetailEmpty(); return; }
  QUOTES = [];
  const score = computeScore(a.risks);
  const blocks = composeBlocks(a);
  const main = blocks.filter(b=>b.expanded), rail = blocks.filter(b=>!b.expanded);
  box.innerHTML = detailHead(doc) + scoreBlock(a, score) + (a.analyzed ? '' : analyzePrompt())
    + main.map(b=>b.html).join('') + (rail.length ? railBlock(rail) : '') + viewerBlock(a) + actionBar(a, score);
  box.querySelectorAll('[data-q]').forEach(elx => elx.addEventListener('click', () => focusClause(QUOTES[+elx.dataset.q])));
  if (a.highlight) highlightInViewer(a.highlight);
}

/* ---- блоки ---- */
function card(titleHtml, count, body){ return `<div class="card fade-up"><h2>${titleHtml}${count!=null?`<span class="count">${count}</span>`:''}</h2>${body}</div>`; }

function scoreBlock(a, score){
  const type = detectType(a);
  if (!a.analyzed){
    return `<div class="card gauge-card fade-up"><div class="gauge">${gaugeSvg(0,'var(--txt-faint)')}<div class="gv" style="font-size:18px;color:var(--txt-faint)">—</div></div>
      <div class="gauge-meta"><div class="band">Не проверено</div><div class="gsub">Тип: ${esc(type)} · запустите анализ для оценки рисков</div></div></div>`;
  }
  const b = scoreBand(score), c = sevCounts(a.risks);
  const sev = ['CRITICAL','HIGH','MEDIUM','LOW'].filter(k=>c[k]).map(k=>`<span class="badge b-${k.toLowerCase()}">${c[k]} ${k}</span>`).join('');
  return `<div class="card gauge-card fade-up"><div class="gauge">${gaugeSvg(score,b.color)}<div class="gv" style="color:${b.color}">${score}</div></div>
    <div class="gauge-meta"><div class="band" style="color:${b.color}">${b.label}</div>
      <div class="gsub">Тип: ${esc(type)} · ${b.sub}</div>
      <div class="sevbar">${sev||'<span class="muted" style="font-size:12px">рисков не найдено</span>'}</div></div></div>`;
}
function gaugeSvg(score, color){
  const r=46, c=2*Math.PI*r, off=c*(1-score/100);
  return `<svg width="108" height="108" viewBox="0 0 108 108">
    <circle cx="54" cy="54" r="${r}" fill="none" stroke="var(--border)" stroke-width="9"/>
    <circle cx="54" cy="54" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`;
}
function analyzePrompt(){
  return `<div class="card fade-up" style="border-color:var(--accent-ring);background:var(--accent-soft)"><div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
    <span style="font-size:14px">${I.info} Документ обработан, но ещё не проанализирован ИИ.</span>
    <button class="btn btn-sm btn-primary" onclick="runFullAnalysis()">${I.shield} Запустить анализ</button></div></div>`;
}
function risksBlock(a){
  const risks = a.risks||[];
  const body = risks.length ? risks.map(r=>{
    let attr=''; if (r.quote){ QUOTES.push(r.quote); attr=` data-q="${QUOTES.length-1}" style="cursor:pointer" title="Показать в тексте" role="button" tabindex="0"`; }
    return `<div class="item"${attr}><div class="item-top"><span class="item-type">${esc(r.riskType||'Риск')}</span>${severityBadge(r.severity)}${r.clauseRef?`<span class="ref-badge">п. ${esc(r.clauseRef)}</span>`:''}</div>${r.quote?`<div class="quote">«${esc(r.quote)}»</div>`:''}<div class="explain">${esc(r.explanation||'')}</div></div>`;
  }).join('') : `<div class="empty">${a.analyzed?'Явных рисков не найдено.':'Запустите анализ, чтобы найти риски.'}</div>`;
  return card(I.shield+' Риски', risks.length, body);
}
function complianceBlock(a){
  const f = a.findings||[];
  const body = f.length ? f.map(x=>{
    let attr=''; if (x.quote){ QUOTES.push(x.quote); attr=` data-q="${QUOTES.length-1}" style="cursor:pointer" title="Показать в тексте" role="button" tabindex="0"`; }
    return `<div class="item"${attr}><div class="item-top">${findingBadge(x.type)}${severityBadge(x.severity)}${x.clauseRef?`<span class="ref-badge">п. ${esc(x.clauseRef)}</span>`:''}</div>${x.quote?`<div class="quote">«${esc(x.quote)}»</div>`:''}<div class="explain">${esc(x.explanation||'')}</div></div>`;
  }).join('') : `<div class="empty">${a.analyzed?'Нарушений политик не найдено.':'Будет доступно после анализа.'}</div>`;
  return card(I.check2+' Комплаенс', f.length, body);
}
function keydataBlock(a, kd){
  const chip=(items,cls,ico)=> items.length?`<div class="chips">${items.map(i=>`<span class="chip ${cls}">${ico}${esc(i)}</span>`).join('')}</div>`:`<div class="empty">—</div>`;
  return card(I.cal+' Ключевые данные', kd.dates.length+kd.amounts.length,
    `<div class="muted" style="font-size:12px;margin-bottom:6px">Даты</div>${chip(kd.dates,'date',I.cal)}
     <div class="muted" style="font-size:12px;margin:12px 0 6px">Суммы</div>${chip(kd.amounts,'amount',I.coin)}`);
}
function profileBlock(pb){
  const items = (pb.items||[]).map(it=>{
    const st=(it.status||'').toUpperCase();
    const color = st==='MISSING'?'var(--danger)':st==='ATTENTION'?'var(--warn)':'var(--success)';
    return `<div class="prof-item"><span class="pdot" style="background:${color}"></span>
      <div style="flex:1"><div class="pl">${esc(it.label||'')}</div>${it.note?`<div class="pn">${esc(it.note)}</div>`:''}</div>
      ${it.clauseRef?`<span class="ref-badge">п. ${esc(it.clauseRef)}</span>`:''}</div>`;
  }).join('') || '<div class="empty">—</div>';
  return `<div class="card fade-up"><h2>${I.list} ${esc(pb.title||'Блок')} <span class="gen-tag">ИИ</span><span class="count">${(pb.items||[]).length}</span></h2>${pb.summary?`<div class="muted" style="font-size:13px;margin:-6px 0 10px">${esc(pb.summary)}</div>`:''}${items}</div>`;
}

/* ---- предложения ИИ: правка договора (принять/отклонить → экспорт) ---- */
function suggestionsBlock(a){
  const head = `${I.shield} Предложения по правкам`;
  if (!a.suggestions){
    return card(head, null, `<div class="muted" style="font-size:13.5px;margin-bottom:10px">ИИ перепишет рискованные пункты на более безопасные формулировки — вы примете или отклоните каждую.</div>
      <button class="btn btn-sm btn-primary" onclick="genSuggestions()">${I.shield} Предложить формулировки</button>`);
  }
  if (!a.suggestions.length) return card(head, 0, '<div class="empty">ИИ не предложил правок.</div>');
  const cards = a.suggestions.map((s,i)=>`
    <div class="sugg ${s.decision==='acc'?'acc':s.decision==='rej'?'rej':''}">
      <div class="sugg-top">${severityBadge(s.severity)}${s.clauseRef?`<span class="ref-badge">п. ${esc(s.clauseRef)}</span>`:''}<span class="muted" style="font-size:12px">${esc(s.riskType||'')}</span></div>
      ${s.original?`<div class="sugg-was">${esc(s.original)}</div>`:''}
      <div class="sugg-now">${esc(s.suggested||'')}</div>
      ${s.rationale?`<div class="sugg-why">${I.info} ${esc(s.rationale)}</div>`:''}
      <div class="sugg-actions">
        <button class="btn btn-sm ${s.decision==='acc'?'btn-primary':'btn-ghost'}" onclick="decideSuggestion(${i},'acc')">${I.check2} Принять</button>
        <button class="btn btn-sm btn-ghost" onclick="decideSuggestion(${i},'rej')">Отклонить</button>
      </div></div>`).join('');
  const accepted = a.suggestions.filter(s=>s.decision==='acc').length;
  const bar = `<div class="row" style="gap:8px;margin-top:8px;flex-wrap:wrap">
    <button class="btn btn-sm btn-primary" ${accepted?'':'disabled'} onclick="exportRedline()">${I.file} Скачать правки (.md)${accepted?' · '+accepted:''}</button>
    <button class="btn btn-sm btn-ghost" ${accepted?'':'disabled'} onclick="buildRevised()">Правленая версия (.txt)</button></div>`;
  return card(head, a.suggestions.length, cards + bar);
}
async function genSuggestions(){
  const id = APP.selected, a = aud(); if (!a) return;
  if (!a.analyzed){ toast('Сначала запустите анализ', 'bad'); return; }
  toast('ИИ готовит формулировки…');
  try {
    const list = await api(`/api/documents/${id}/suggestions`, { method:'POST' });
    a.suggestions = (list||[]).map(s=>({ ...s, decision:null }));
    renderAudit(id);
    toast(a.suggestions.length ? ('Готово: '+a.suggestions.length+' правок') : 'ИИ не предложил правок');
    scrollSugg();
  } catch(e){ toast(e.message + (e.status===500?' (нужна модель)':''), 'bad'); }
}
function decideSuggestion(i, d){ const a=aud(); if(!a||!a.suggestions) return; a.suggestions[i].decision = a.suggestions[i].decision===d?null:d; renderAudit(APP.selected); }
function scrollSugg(){ document.querySelector('.sugg')?.scrollIntoView({behavior:'smooth', block:'center'}); }
function exportRedline(){
  const a=aud(); if(!a||!a.suggestions) return;
  const acc = a.suggestions.filter(s=>s.decision==='acc'); if(!acc.length) return;
  const doc = APP.docs.find(d=>d.id===APP.selected); const name = doc?doc.filename.replace(/\.pdf$/i,''):'contract';
  let md = `# Предложенные правки — ${doc?doc.filename:''}\n\nСгенерировано ИИ, проверено пользователем (роль: ${ROLES[APP.role]}). Принято правок: ${acc.length}.\n\n`;
  acc.forEach((s,i)=>{ md += `## ${i+1}. Пункт ${s.clauseRef||'—'} · ${s.riskType||''} (${s.severity||''})\n\n**Было:**\n> ${(s.original||'').replace(/\n/g,'\n> ')}\n\n**Стало:**\n> ${(s.suggested||'').replace(/\n/g,'\n> ')}\n\n_${s.rationale||''}_\n\n`; });
  download(name+'-правки.md', md, 'text/markdown');
  toast('Файл с правками скачан');
}
function buildRevised(){
  const a=aud(); if(!a||!a.suggestions) return;
  const acc = a.suggestions.filter(s=>s.decision==='acc'); if(!acc.length) return;
  let text = a.text||''; let applied=0; const unmatched=[];
  acc.forEach(s=>{ if (s.original && text.includes(s.original)){ text = text.replace(s.original, s.suggested||''); applied++; } else unmatched.push(s.clauseRef||'—'); });
  const doc = APP.docs.find(d=>d.id===APP.selected); const name = doc?doc.filename.replace(/\.pdf$/i,''):'contract';
  download(name+'-revised.txt', text, 'text/plain');
  toast(`Правленая версия: применено ${applied}${unmatched.length?', не сопоставлено '+unmatched.length:''}`);
}
function download(name, content, type){
  const blob = new Blob([content], {type:type+';charset=utf-8'});
  const url = URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
}

/* ---- DocumentViewer: текст с подсветкой пункта (двусторонняя связь риск↔первоисточник) ---- */
function viewerBlock(a){
  const text = a.text||'';
  return `<div class="card fade-up"><h2>${I.file} Текст документа <span class="muted" style="margin-left:auto;font-size:11px;letter-spacing:0;text-transform:none">клик по риску — подсветка</span></h2>
    <div class="viewer" id="viewerBox">${text?esc(text):'<span class="empty">Текст недоступен.</span>'}</div></div>`;
}
function focusClause(quote){ const a=aud(); if(!a) return; a.highlight = quote; highlightInViewer(quote); }
function highlightInViewer(quote){
  const box = el('viewerBox'), a = aud(); if (!box||!a||!quote) return;
  const text = a.text||''; const needle = quote.slice(0, Math.min(quote.length,120)).toLowerCase();
  const idx = text.toLowerCase().indexOf(needle);
  if (idx<0){ box.innerHTML = esc(text); toast('Цитата не найдена в тексте', 'bad'); return; }
  const end = Math.min(text.length, idx + Math.max(quote.length, needle.length));
  box.innerHTML = esc(text.slice(0,idx)) + '<mark>' + esc(text.slice(idx,end)) + '</mark>' + esc(text.slice(end));
  box.querySelector('mark')?.scrollIntoView({behavior:'smooth', block:'center'});
}

/* ---- rail: свёрнутый движком инвентарь ---- */
function railBlock(rail){
  return `<div class="card fade-up"><button class="rail-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.style.display=this.classList.contains('open')?'block':'none'">${I.chev} Ещё ${rail.length} ${plural(rail.length,'блок','блока','блоков')} · свёрнуто движком</button>
    <div style="display:none;margin-top:12px">${rail.map(b=>b.html).join('')}</div></div>`;
}
function plural(n,a,b,c){ const m=n%100, d=n%10; if(m>=11&&m<=14) return c; if(d===1) return a; if(d>=2&&d<=4) return b; return c; }

/* ---- ActionBar: действие по умолчанию зависит от роли ---- */
function actionBar(a, score){
  const analyze = `<button class="btn btn-sm btn-ghost" onclick="runFullAnalysis()">${I.shield} ${a.analyzed?'Переанализировать':'Запустить анализ'}</button>`;
  if (APP.role==='reader') return `<div class="actionbar"><span class="muted" style="font-size:13px">Режим чтения — действия отключены.</span><span class="muted" style="margin-left:auto;font-size:12px">Раскладка под «Чтение»</span></div>`;
  let primary='';
  if (APP.role==='lawyer') primary = a.suggestions
    ? `<button class="btn btn-sm btn-primary" onclick="scrollSugg()">${I.shield} К предложениям</button>`
    : `<button class="btn btn-sm btn-primary" onclick="genSuggestions()">${I.shield} Предложить формулировки</button>`;
  if (APP.role==='buyer') primary = `<button class="btn btn-sm btn-primary" onclick="genSuggestions()">${I.coin} Уточнить условия</button>`;
  if (APP.role==='approver'){
    const dec=a.decision;
    primary = `<button class="btn btn-sm btn-primary" onclick="decideDoc('ok')">${I.check2} Согласовать</button>
      <button class="btn btn-sm btn-ghost" onclick="decideDoc('rework')">На доработку</button>
      ${dec==='ok'?'<span class="stamp ok">Согласовано</span>':dec==='rework'?'<span class="stamp rework">На доработку</span>':''}`;
  }
  return `<div class="actionbar">${primary}${analyze}<span class="muted" style="margin-left:auto;font-size:12px">Раскладка под «${ROLES[APP.role]}»</span></div>`;
}
function decideDoc(d){ const a=aud(); if(!a) return; a.decision = a.decision===d?null:d; saveDecision(APP.selected, a.decision); renderAudit(APP.selected); toast(d==='ok'?'Согласовано (фиксируется локально)':'На доработку (фиксируется локально)'); }
function saveDecision(id,d){ try{ const m=JSON.parse(localStorage.getItem('ca-decisions')||'{}'); if(d) m[id]=d; else delete m[id]; localStorage.setItem('ca-decisions', JSON.stringify(m)); }catch(e){} }
function loadDecision(id){ try{ return (JSON.parse(localStorage.getItem('ca-decisions')||'{}'))[id]||null; }catch(e){ return null; } }

/* ---- полный анализ ИИ: риски + комплаенс + генеративный профиль ---- */
async function runFullAnalysis(){
  const id = APP.selected, a = aud(); if (!a) return;
  toast('Анализ ИИ: риски, комплаенс, профиль…');
  el('detail').querySelectorAll('.actionbar .btn').forEach(b=> b.disabled=true);
  try {
    const [risks, findings, profile] = await Promise.all([
      api(`/api/documents/${id}/risks`, { method:'POST' }),
      api(`/api/documents/${id}/compliance`, { method:'POST' }).catch(()=>[]),
      api(`/api/documents/${id}/profile`, { method:'POST' }).catch(()=>null)
    ]);
    a.risks = risks||[]; a.findings = findings||[]; a.profile = profile; a.analyzed = true; a.suggestions = null;
    renderAudit(id);
    toast('Анализ завершён');
  } catch(e){ toast(e.message + (e.status===500?' (нужна модель)':''), 'bad'); renderAudit(id); }
}

/* ---- search ---- */
async function runSearch(e){
  e.preventDefault();
  const q = el('searchQ').value.trim(); if (!q) return;
  const out = el('searchOut');
  out.innerHTML = `<div class="row muted" style="font-size:13.5px"><span class="spinner"></span> Ищу по смыслу…</div>`;
  try {
    const hits = await api('/api/search', { method:'POST', body:{ query:q } });
    if (!hits.length){ out.innerHTML = '<div class="empty">Ничего не найдено. Загрузите и обработайте документы.</div>'; return; }
    out.innerHTML = hits.map(h => {
      const sim = Math.max(0, Math.min(1, 1 - (h.distance ?? 1)));
      return `<div class="hit"><div class="hit-top">${h.clauseRef?`<span class="ref-badge">п. ${esc(h.clauseRef)}</span>`:'<span class="muted" style="font-size:12px">фрагмент</span>'}<span class="dist">сходство ${(sim*100).toFixed(0)}%</span></div>
        <div style="font-size:14px;white-space:pre-wrap">${esc(h.chunkText)}</div><div class="sim-bar"><i style="width:${(sim*100).toFixed(0)}%"></i></div></div>`;
    }).join('');
  } catch(e){ out.innerHTML = `<div class="banner err">${I.alert}<span>${esc(e.message)}${e.status===500?' — вероятно, не настроен OpenAI-ключ.':''}</span></div>`; }
}

/* ---- policies ---- */
function policiesCard(){
  return `<div class="card">
    <h2>${I.check2} Политики компании <span class="count" id="polCount">0</span></h2>
    <div id="polList"><div class="muted" style="font-size:13px">Загружаю…</div></div>
    <details style="margin-top:12px"><summary class="btn btn-ghost btn-sm" style="display:inline-flex;list-style:none">${I.plus} Добавить политику</summary>
      <form id="policyForm" style="margin-top:12px">
        <div class="field"><label>Название</label><input class="input" name="title" placeholder="Ответственность поставщика" required></div>
        <div class="field"><label>Текст политики</label><textarea class="input" name="text" placeholder="Поставщик несёт ответственность за…" required></textarea></div>
        <label class="check" style="margin-bottom:12px"><input type="checkbox" name="mandatory"> Обязательная (отсутствие — нарушение)</label>
        <button class="btn btn-primary btn-sm" type="submit">${I.plus} Сохранить политику</button>
      </form>
    </details>
  </div>`;
}
async function loadPolicies(){
  try {
    const pols = await api('/api/policies') || [];
    el('polCount').textContent = pols.length;
    el('polList').innerHTML = pols.length ? pols.map(p => `
      <div class="row" style="gap:9px;padding:8px 0;border-bottom:1px solid var(--border-soft)">
        ${p.mandatory?'<span class="badge b-medium">обяз.</span>':'<span class="badge b-low">опц.</span>'}
        <span style="font-size:14px">${esc(p.title)}</span></div>`).join('') : '<div class="empty">Политик пока нет. Добавьте, чтобы комплаенс находил нарушения.</div>';
  } catch(e){ el('polList').innerHTML = `<div class="muted" style="font-size:13px">${esc(e.message)}</div>`; }
}
async function addPolicy(e){
  e.preventDefault();
  const f = e.target; const data = Object.fromEntries(new FormData(f).entries());
  data.mandatory = !!f.mandatory.checked;
  try {
    await api('/api/policies', { method:'POST', body:data });
    toast('Политика добавлена'); f.reset(); loadPolicies();
  } catch(ex){ toast(ex.message, 'bad'); }
}

/* ============================ shared ============================ */
function wireDrop(drop, input, handler){
  if (!drop) return;
  input.addEventListener('change', () => input.files[0] && handler(input.files[0]));
  ['dragover','dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
  ['dragleave','dragend'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
  drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); const fl = e.dataTransfer.files[0]; if (fl) handler(fl); });
}
function footer(){
  return `<footer><div class="shell foot">
    <span>© Contract Audit · AI-аудит B2B-договоров</span>
    <span class="stack"><code>Java 21</code><code>Spring Boot 3.4</code><code>Spring AI</code><code>PostgreSQL + pgvector</code><code>JWT RS256</code></span>
  </div></footer>`;
}
