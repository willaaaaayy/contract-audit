name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: contract_audit
          POSTGRES_USER: contract_audit
          POSTGRES_PASSWORD: contract_audit
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U contract_audit"
          --health-interval 5s --health-timeout 5s --health-retries 10

      redis:
        image: redis:7-alpine
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

      # bitnami/minio стартует в режиме server без явной команды (GH services не поддерживают command)
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports: [ "9000:9000" ]
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s --health-timeout 5s --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Tesseract (для OCR-теста)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Test
        env:
          EXTERNAL_DB: "true"
          TEST_DB_URL: jdbc:postgresql://localhost:5432/contract_audit
          TEST_DB_USER: contract_audit
          TEST_DB_PASSWORD: contract_audit
          OCR_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
          OCR_TESSDATA_PATH: /usr/share/tesseract-ocr/5/tessdata
        run: ./mvnw -B verify

  build-image:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false                       # включить push + добавить login при наличии реестра
          tags: contract-audit:${{ github.sha }}
