name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Новый push в ту же ветку отменяет ещё бегущий прогон — не жжём минуты впустую.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: contract_audit
          POSTGRES_USER: contract_audit
          POSTGRES_PASSWORD: contract_audit
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U contract_audit"
          --health-interval 5s --health-timeout 5s --health-retries 10

      redis:
        image: redis:7-alpine
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # Тот же образ, что и в docker-compose.yml. Отдельным шагом (не services:),
      # потому что GH-services не умеют передавать command, а minio/minio его требует.
      - name: Start MinIO (тот же образ, что в compose)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9000/minio/health/live && break
            sleep 2
          done

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Tesseract (для OCR-теста)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Test
        env:
          EXTERNAL_DB: "true"
          TEST_DB_URL: jdbc:postgresql://localhost:5432/contract_audit
          TEST_DB_USER: contract_audit
          TEST_DB_PASSWORD: contract_audit
          OCR_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
          OCR_TESSDATA_PATH: /usr/share/tesseract-ocr/5/tessdata
        run: ./mvnw -B verify

  build-image:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/contract-audit:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/contract-audit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
